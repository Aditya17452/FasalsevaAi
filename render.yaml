# Render Blueprint for the FasalSeva backend — free tier.
#
# This does NOT automatically change your existing "fasalsevaai" service —
# Render only applies a render.yaml when you create a NEW Blueprint deploy
# (New + > Blueprint in the dashboard, pointed at this repo) or explicitly
# sync an existing Blueprint-linked service to it. To match your CURRENT
# service to this, just set the env vars below in its dashboard instead.
#
# No persistent disk here on purpose: the free plan doesn't support one.
# DB_PATH is left unset so it falls back to a local file next to main.py —
# that file resets (back to the 7 seed cold storages, no real registrations
# or logged-in users) every time the free instance cold-starts after being
# idle, and on every redeploy. That's an accepted tradeoff for staying on
# free tier, not a bug. If you outgrow that later, look at Turso (free-tier,
# SQLite-compatible) or a hosted Postgres for real persistence.

services:
  - type: web
    name: fasalsevaai
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATAGOV_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
