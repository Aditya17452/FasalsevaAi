name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m py_compile main.py

      - name: Import smoke test
        run: python -c "import main"
        env:
          # No real secrets needed to import — GROQ_API_KEY is intentionally
          # left unset here to prove the app degrades gracefully without it.
          SESSION_SECRET: ci-smoke-test-secret

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://fasalsevaai.onrender.com

      # Not gating the build on this yet: the existing codebase has ~1200
      # pre-existing prettier/eslint findings, so failing here would block
      # every PR on unrelated formatting debt. Surfaced non-blocking so new
      # violations are visible without a giant unrelated cleanup commit.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
